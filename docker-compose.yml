services:
  postgres:
    image: postgres:16-alpine
    container_name: drawingflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: drawingflow
      POSTGRES_PASSWORD: drawingflow
      POSTGRES_DB: drawingflow
    ports:
      - "5434:5432"
    volumes:
      - drawingflow-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U drawingflow -d drawingflow"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  drawingflow-postgres-data:

